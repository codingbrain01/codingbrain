<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0d0d14"/>
  <!-- Subtle border glow -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="6.5" stroke="#6366f1" stroke-opacity="0.25"/>
  <!-- > chevron prompt -->
  <path
    d="M6 10.5 L14.5 16 L6 21.5"
    stroke="#818cf8"
    stroke-width="2.8"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- _ cursor (blinking feel via width/position) -->
  <rect x="17" y="20" width="9" height="2.5" rx="1.25" fill="#38bdf8"/>
</svg>
