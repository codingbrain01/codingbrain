<!doctype html>
<html lang="en">
  <head>
    <!-- Set dark class before paint to prevent flash of light theme -->
    <script>
      (function () {
        var s = localStorage.getItem('theme');
        if (s !== 'light') document.documentElement.classList.add('dark');
      })();
    </script>
